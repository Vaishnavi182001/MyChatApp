<app-toolbar></app-toolbar>

<div class="container" styles="margin-top:30px">
    <div class = "row">
        <div class="col s12 m4 l3">
            <app-side></app-side>
        </div>

        <div class="col s12 m8 l9">
            <div class="col s12 m10">
                <div class="row">
                    <div class="card">
                        <ul class = "collection">
                            <li class="collection-item">
                                <span class="post">{{post}}</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col s12 m12 l10">
                    <div class="card postDiv">
                        <div class="card-content">
                            <form [formGroup]="commentForm" (ngSubmit)="AddComment()">
                                <div class="formDiv">
                                  <textarea formControlName="comment" class="materialize-textarea"></textarea>
                                  <button class="btn postBtn" [disabled]="!commentForm.valid" >
                                    Add Comment
                                  </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div>
                <ul class="collection col s12 m10" *ngFor="let comment of commentsArray">
                    <li class="collection-item avat">
                        <img class="circle" src="https://placehold.it/50x50">
                        <span class="title">{{comment.username}}</span>
                        <p class="time">{{TimeFromNow(comment.createdAt)}}</p>
                        <p class="PostComment">{{comment.comment}}</p>
                    </li>
                </ul>

            </div>
        </div>
    </div>
</div>
