<app-toolbar></app-toolbar>
<div class="container" styles="margin-top:30px">
    <div class = "row">
        <div class="col s12 m4 l3">
            <app-side></app-side>
        </div>

        <div class="col s12 m8 l9">
         <div class="row" *ngIf="following.length > 0">
            <div class="col s12 m6 l4 cardDiv" *ngFor="let user of following">
                <div class="card">
                    <a>
                        <div class="card-image imgDiv">
                            <img class="imgCircle responsive-img" src="https://cn.i.cdn.ti-platform.com/cnemea/content/384/showpage/tom-and-jerry/uk/showpano.png?imwidth=1600">

                        </div>
                    </a>
                    <div class="card-action">
                        <h3 class="card-title">
                           {{user.userFollowed.username}}
                        </h3>

                        <button class="btn" (click)="unFollowUser(user.userFollowed)">UnFollow</button>

                    </div>
                </div>

            </div>
         </div>
         <div class="row" *ngIf="following.length === 0">
            <h4 class="text">You are not following anyone yet</h4>
          </div>
        </div>
    </div>
</div>
