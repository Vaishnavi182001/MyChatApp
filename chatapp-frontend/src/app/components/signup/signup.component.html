<div class="container">
    <div class="row">
        <div class="col s10 offset-s1" id="panel">
          <div class="progress" *ngIf="showSpinner">
            <div class="indeterminate"></div>
        </div>
            <h3 id="title">Sign Up</h3>
            <div id="errorMsg" *ngIf="errorMessage">
              <span>{{errorMessage}}</span>
            </div>

            <form class="col s12" [formGroup]="signupForm" novalidate (ngSubmit)="signupUser()">
                <div class="row">
                  <div class="input-field col s12">
                    <input placeholder="Username" id="user_name" type="text" formControlName="username">
                    <label for="user_name">User Name</label>
                    <span class="error" *ngIf="signupForm.get('username')?.invalid && signupForm.get('username')?.touched">
                      Username is required
                    </span>
                  </div>

                </div>

                <div class="row">
                    <div class="input-field col s12">
                      <input id="Email" type="email"  formControlName="email">
                      <label for="Email">Email</label>
                      <span class="error" *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched">
                        Email is required
                      </span>
                    </div>
                  </div>

                <div class="row">
                  <div class="input-field col s12">
                    <input id="pass-word" type="password" formControlName="password">
                    <label for="pass-word">Password</label>
                    <span class="error" *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched">
                      Password is required
                    </span>
                  </div>
                </div>


                <button class="btn waves-effect" id="signupbtn" [disabled]="!signupForm.valid">Sign Up</button>

              </form>

        </div>

    </div>
</div>
